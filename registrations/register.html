<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>活動報名</title>
  <style>
    :root {
      --blue: #12336b;
      --teal: #23716b;
      --gold: #b8892f;
      --red: #b44d5d;
      --ink: #182230;
      --muted: #667085;
      --line: #d9e2ec;
      --paper: #f2f5f8;
      --card: #ffffff;
      --focus: #2f7d4e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #dfe7ef;
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      letter-spacing: 0;
    }
    .app {
      width: min(100%, 460px);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
      padding: 18px 14px 28px;
    }
    header {
      background: linear-gradient(135deg, var(--blue), var(--teal));
      color: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 16px 36px rgba(18, 51, 107, .18);
    }
    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    header p {
      margin: 8px 0 0;
      color: rgba(255,255,255,.84);
      font-size: 14px;
      line-height: 1.55;
      font-weight: 700;
    }
    form {
      margin-top: 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, .05);
    }
    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }
    label, legend {
      color: #243246;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 900;
    }
    .required {
      color: var(--red);
      margin-left: 3px;
    }
    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid #cfd9e5;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      font: inherit;
      font-size: 16px;
      outline: none;
    }
    textarea {
      min-height: 86px;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(47, 125, 78, .13);
    }
    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 14px;
    }
    .sessions {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }
    .session-option {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 9px;
      align-items: start;
      min-height: 58px;
      border: 1px solid #dce4ee;
      border-radius: 8px;
      background: #f8fafc;
      padding: 11px;
      cursor: pointer;
    }
    .session-option input {
      width: 18px;
      min-height: 18px;
      height: 18px;
      margin: 3px 0 0;
      accent-color: var(--blue);
    }
    .session-title {
      display: block;
      color: var(--blue);
      font-size: 15px;
      line-height: 1.35;
      font-weight: 900;
      overflow-wrap: anywhere;
    }
    .session-meta {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 800;
    }
    .notice {
      margin-top: 12px;
      border-radius: 8px;
      padding: 12px;
      background: #fff8e8;
      color: #7a4f10;
      border: 1px solid #efd49e;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 800;
    }
    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    button:disabled {
      opacity: .62;
      cursor: wait;
    }
    .message {
      display: none;
      margin-top: 12px;
      border-radius: 8px;
      padding: 13px;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 800;
    }
    .message.ok {
      display: block;
      background: #eef8f0;
      border: 1px solid #b9dfc2;
      color: #28643e;
    }
    .message.error {
      display: block;
      background: #fff0f3;
      border: 1px solid #f2b9c2;
      color: #9f3345;
    }
    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .nav a {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--blue);
      padding: 0 11px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1 id="title">活動報名</h1>
      <p id="subtitle">載入活動資料中...</p>
      <p id="fee"></p>
    </header>

    <form id="form" hidden>
      <fieldset>
        <legend>選擇場次<span class="required">*</span></legend>
        <div class="sessions" id="sessions"></div>
      </fieldset>

      <div id="fields"></div>
      <button id="submit" type="submit">送出報名</button>
      <div id="message" class="message"></div>
    </form>

    <div class="nav">
      <a href="index.html">回活動列表</a>
      <a href="../">回手機助理總覽</a>
    </div>
  </div>

  <script>
    const labels = {
      name: '姓名',
      phone: '手機',
      lineId: 'LINE ID',
      referrer: '介紹人',
      team: '所屬團隊',
      companions: '同行人數',
      firstTime: '是否第一次參加',
      note: '備註'
    };
    const fieldOrder = ['name', 'phone', 'lineId', 'referrer', 'team', 'companions', 'firstTime', 'note'];
    const optionalFields = new Set(['note']);
    const params = new URLSearchParams(location.search);
    const eventId = params.get('event') || 'mini_training_2026';
    let currentEvent = null;

    const titleEl = document.querySelector('#title');
    const subtitleEl = document.querySelector('#subtitle');
    const feeEl = document.querySelector('#fee');
    const formEl = document.querySelector('#form');
    const sessionsEl = document.querySelector('#sessions');
    const fieldsEl = document.querySelector('#fields');
    const messageEl = document.querySelector('#message');
    const submitEl = document.querySelector('#submit');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function requiredMark(field) {
      return optionalFields.has(field) ? '' : '<span class="required">*</span>';
    }

    function renderField(field) {
      const label = labels[field] || field;
      const required = optionalFields.has(field) ? '' : 'required';
      if (field === 'companions') {
        return `
          <div class="field">
            <label for="${field}">${label}${requiredMark(field)}</label>
            <input id="${field}" name="${field}" type="number" min="0" step="1" value="0" ${required} />
          </div>
        `;
      }
      if (field === 'firstTime') {
        return `
          <div class="field">
            <label for="${field}">${label}${requiredMark(field)}</label>
            <select id="${field}" name="${field}" ${required}>
              <option value="">請選擇</option>
              <option value="是">是</option>
              <option value="否">否</option>
            </select>
          </div>
        `;
      }
      if (field === 'note') {
        return `
          <div class="field">
            <label for="${field}">${label}</label>
            <textarea id="${field}" name="${field}" placeholder="可填寫特殊需求或補充資料"></textarea>
          </div>
        `;
      }
      const inputMode = field === 'phone' ? 'tel' : 'text';
      return `
        <div class="field">
          <label for="${field}">${label}${requiredMark(field)}</label>
          <input id="${field}" name="${field}" type="${inputMode}" ${required} />
        </div>
      `;
    }

    function renderEvent(event) {
      currentEvent = event;
      document.title = `${event.title}｜活動報名`;
      titleEl.textContent = event.title;
      subtitleEl.textContent = event.subtitle || '';
      feeEl.textContent = event.fee ? `費用：${event.fee}` : '';
      sessionsEl.innerHTML = event.sessions.map((session, index) => `
        <label class="session-option">
          <input type="radio" name="sessionId" value="${escapeHtml(session.id)}" ${index === 0 ? 'checked' : ''} required />
          <span>
            <span class="session-title">${escapeHtml(session.label)}</span>
            <span class="session-meta">${escapeHtml(session.time)}｜${escapeHtml(session.location)}</span>
          </span>
        </label>
      `).join('');
      const fields = fieldOrder.filter((field) => event.fields.includes(field));
      fieldsEl.innerHTML = fields.map(renderField).join('') + (event.note ? `<div class="notice">${escapeHtml(event.note)}</div>` : '');
      formEl.hidden = false;
    }

    function setMessage(type, text) {
      messageEl.className = `message ${type}`;
      messageEl.textContent = text;
    }

    fetch('../api/events', { cache: 'no-store' })
      .then((response) => response.json())
      .then((data) => {
        const event = (data.events || []).find((item) => item.id === eventId);
        if (!event) throw new Error('找不到活動');
        renderEvent(event);
      })
      .catch(() => {
        titleEl.textContent = '找不到活動';
        subtitleEl.textContent = '請回活動列表重新選擇。';
      });

    formEl.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!currentEvent) return;
      submitEl.disabled = true;
      setMessage('', '');

      const formData = new FormData(formEl);
      const payload = {
        eventId: currentEvent.id,
        sessionId: formData.get('sessionId')
      };
      for (const field of currentEvent.fields) {
        payload[field] = formData.get(field) ?? '';
      }

      try {
        const response = await fetch('../api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.error || '送出失敗');
        }
        formEl.reset();
        const firstSession = formEl.querySelector('input[name="sessionId"]');
        if (firstSession) firstSession.checked = true;
        const companions = formEl.querySelector('#companions');
        if (companions) companions.value = '0';
        setMessage('ok', '報名已完成，後台人數已同步更新。');
      } catch (error) {
        setMessage('error', error.message || '送出失敗，請稍後再試。');
      } finally {
        submitEl.disabled = false;
      }
    });
  </script>
</body>
</html>

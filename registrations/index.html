<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>活動報名系統</title>
  <style>
    :root {
      --blue: #12336b;
      --teal: #23716b;
      --gold: #b8892f;
      --red: #b44d5d;
      --ink: #182230;
      --muted: #667085;
      --line: #d9e2ec;
      --paper: #f2f5f8;
      --card: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #dfe7ef;
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      letter-spacing: 0;
    }
    .app {
      width: min(100%, 460px);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
      padding: 18px 14px 26px;
    }
    header {
      background: linear-gradient(135deg, var(--blue), var(--teal));
      color: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 16px 36px rgba(18, 51, 107, .18);
    }
    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.25;
    }
    header p {
      margin: 8px 0 0;
      color: rgba(255,255,255,.82);
      font-size: 14px;
      line-height: 1.55;
      font-weight: 700;
    }
    .top-links {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    a.button {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.24);
      background: rgba(255,255,255,.14);
      color: #fff;
      padding: 0 12px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
    }
    main {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }
    .event {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, .05);
    }
    .event h2 {
      margin: 0;
      color: var(--blue);
      font-size: 20px;
      line-height: 1.3;
    }
    .event p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      font-weight: 700;
    }
    .sessions {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .session {
      background: #f8fafc;
      border: 1px solid #e6ecf3;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 800;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }
    .actions a {
      min-height: 42px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      border: 1px solid transparent;
    }
    .primary { background: var(--blue); color: #fff; }
    .secondary { background: #fff7e8; color: #8a5a12; border-color: #efd49e !important; }
    .empty {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>活動報名系統</h1>
      <p>集中管理微新集訓與東芳禪柔報名。前台提供報名連結，後台查看即時人數與名單。</p>
      <div class="top-links">
        <a class="button" href="../">回手機助理總覽</a>
      </div>
    </header>
    <main id="events">
      <div class="empty">載入活動中...</div>
    </main>
  </div>

  <script>
    const eventsEl = document.querySelector('#events');
    const params = new URLSearchParams(location.search);
    const adminKey = params.get('key') || '';

    function text(value) {
      return String(value ?? '');
    }

    function renderEvent(event) {
      const sessions = event.sessions.map((session) => `
        <div class="session">
          ${text(session.label)}｜${text(session.time)}<br />
          ${text(session.location)}
        </div>
      `).join('');

      return `
        <article class="event">
          <h2>${text(event.title)}</h2>
          <p>${text(event.subtitle)}</p>
          ${event.fee ? `<p>費用：${text(event.fee)}</p>` : ''}
          ${event.note ? `<p>${text(event.note)}</p>` : ''}
          <div class="sessions">${sessions}</div>
          <div class="actions">
            <a class="primary" href="register.html?event=${encodeURIComponent(event.id)}">報名連結</a>
            <a class="secondary" href="admin.html?event=${encodeURIComponent(event.id)}${adminKey ? `&key=${encodeURIComponent(adminKey)}` : ''}">後台人數</a>
          </div>
        </article>
      `;
    }

    fetch('../api/events', { cache: 'no-store' })
      .then((response) => response.json())
      .then((data) => {
        const events = Array.isArray(data.events) ? data.events : [];
        eventsEl.innerHTML = events.length
          ? events.map(renderEvent).join('')
          : '<div class="empty">目前沒有活動。</div>';
      })
      .catch(() => {
        eventsEl.innerHTML = '<div class="empty">活動資料暫時無法讀取，請稍後再開。</div>';
      });
  </script>
</body>
</html>
